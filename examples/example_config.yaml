# TeleFuser Example Runner Configuration
# =================================================
#
# Each pipeline entry explicitly lists the script to run and its parameters.
# No auto-discovery -- this file IS the test registry.
#
# Usage:
#   python examples/run_examples.py --list
#   python examples/run_examples.py --pipeline wan21_1_3b_t2v
#   python examples/run_examples.py --all
#   python examples/run_examples.py --all --update-baseline

defaults:
  seed: 42
  timeout_seconds: 1800
  psnr_min: 25.0
  ssim_min: 0.85
  pixel_diff_max: 0.02

output_root: work_dirs/example_outputs

pipelines:

  # ============================================================
  # wan_video — Text to Video
  # ============================================================

  wan21_1_3b_t2v:
    script: wan_video/wan21_1_3b_text_to_video_h100.py
    gpu_count: 1
    output_type: video
    resolution: "480p"
  wan21_1_3b_t2v_cfgp:
    script: wan_video/wan21_1_3b_text_to_video_h100.py
    gpu_count: 2
    output_type: video
    resolution: "480p"
  # ============================================================
  # wan_video — Image to Video
  # ============================================================

  wan21_14b_i2v:
    script: wan_video/wan21_14b_image_to_video_h100.py
    gpu_count: 1
    output_type: video
    input_image_path: examples/data/101235-video-720_0.png
    resolution: "480p"
    ppl_config_overrides:
      attn_impl: TORCH_SDPA

  wan21_14b_i2v_lora:
    script: wan_video/wan21_14b_image_to_video_lora_h100.py
    gpu_count: 1
    output_type: video
    input_image_path: examples/data/101235-video-720_0.png
    resolution: "480p"
    ppl_config_overrides:
      attn_impl: TORCH_SDPA

  wan22_14b_i2v:
    script: wan_video/wan22_14b_image_to_video_h100.py
    gpu_count: 1
    output_type: video
    input_image_path: examples/data/101235-video-720_0.png
    resolution: "480p"
    ppl_config_overrides:
      attn_impl: TORCH_SDPA

  wan22_14b_i2v_distill_sp:
    script: wan_video/wan22_14b_image_to_video_distill_h100.py
    gpu_count: 2
    output_type: video
    input_image_path: examples/data/101235-video-720_0.png
    resolution: "480p"
    ppl_config_overrides:
      attn_impl: TORCH_SDPA
  wan22_14b_i2v_distill:
    script: wan_video/wan22_14b_image_to_video_distill_h100.py
    gpu_count: 1
    output_type: video
    input_image_path: examples/data/101235-video-720_0.png
    resolution: "480p"
    ppl_config_overrides:
      attn_impl: TORCH_SDPA

  wan22_14b_i2v_lora:
    script: wan_video/wan22_14b_image_to_video_lora_h100.py
    gpu_count: 1
    output_type: video
    input_image_path: examples/data/101235-video-720_0.png
    resolution: "480p"
    ppl_config_overrides:
      attn_impl: TORCH_SDPA

  wan22_14b_i2v_mix:
    script: wan_video/wan22_14b_image_to_video_mix_h100.py
    gpu_count: 1
    output_type: video
    input_image_path: examples/data/101235-video-720_0.png
    resolution: "480p"
    ppl_config_overrides:
      attn_impl: TORCH_SDPA

  # ============================================================
  # lingbot_world_fast - Image to Video
  # ============================================================

  lingbot_world_fast_i2v:
    script: lingbot/lingbot_world_fast_image_to_video_h100.py
    gpu_count: 1
    output_type: video
    input_image_path: examples/data/lingbot_world_fast/image.jpg
    timeout_seconds: 3600
    resolution: "480p"
    ppl_config_overrides:
      attn_impl: TORCH_SDPA
      frame_num: 13

  # ============================================================
  # hunyuan_video
  # ============================================================

  hunyuan_t2v:
    script: hunyuan_video/hunyuan_video_t2v.py
    gpu_count: 1
    output_type: video
    timeout_seconds: 3600
    max_gpu_memory_mb: 49152
    resolution: "480p"

  hunyuan_i2v:
    script: hunyuan_video/hunyuan_video_i2v.py
    gpu_count: 1
    output_type: video
    input_image_path: examples/data/101235-video-720_0.png
    timeout_seconds: 3600
    max_gpu_memory_mb: 55296
    resolution: "480p"

  # ============================================================
  # qwen_image
  # ============================================================

  qwen_t2i:
    script: qwen_image/qwen_image_t2i_h100.py
    gpu_count: 1
    output_type: image
    pixel_diff_max: 0.08

  qwen_t2i_lora:
    script: qwen_image/qwen_image_t2i_lora_h100.py
    gpu_count: 1
    output_type: image
    ppl_config_overrides:
      attn_impl: TORCH_SDPA

  qwen_image_edit:
    script: qwen_image/qwen_image_edit_plus_h100.py
    gpu_count: 1
    output_type: image
    input_image_path: examples/data/edit2511input.png

  # ============================================================
  # z_image
  # ============================================================

  z_image_turbo_t2i:
    script: z_image/z_image_turbo_t2i_h100.py
    gpu_count: 1
    output_type: image

  # ============================================================
  # flashvsr
  # ============================================================

  flashvsr_stream:
    script: flashvsr/flashvsr_stream.py
    gpu_count: 1
    output_type: video
    input_video_path: examples/data/dag.mp4
    max_gpu_memory_mb: 26624

  ## ============================================================
  # longcat_video
  # ============================================================

  longcat_t2v:
   script: longcat_video/longcat_text_to_video.py
   gpu_count: 1
   output_type: video
   timeout_seconds: 3600
   resolution: "480p"
   ppl_config_overrides:
     attn_impl: TORCH_SDPA

  longcat_i2v:
   script: longcat_video/longcat_image_to_video.py
   gpu_count: 1
   output_type: video
   input_image_path: examples/data/101235-video-720_0.png
   timeout_seconds: 3600
   resolution: "480p"
   ppl_config_overrides:
     attn_impl: TORCH_SDPA

  longcat_video_continue:
   script: longcat_video/longcat_video_continue.py
   gpu_count: 1
   output_type: video
   input_video_path: examples/data/dag.mp4
   timeout_seconds: 3600
   resolution: "480p"
   ppl_config_overrides:
     attn_impl: TORCH_SDPA

  longcat_video_unify:
   script: longcat_video/longcat_video_unify.py
   gpu_count: 1
   output_type: video
   input_image_path: examples/data/101235-video-720_0.png
   timeout_seconds: 3600
   resolution: "480p"
   ppl_config_overrides:
     attn_impl: TORCH_SDPA

  longcat_t2v_refine:
   script: longcat_video/longcat_text_to_video_refine.py
   gpu_count: 1
   output_type: video
   timeout_seconds: 7200
   resolution: "480p"
   ppl_config_overrides:
     attn_impl: TORCH_SDPA
  # liveact 
  liveact_s2v_h100:
    script: liveact/liveact_s2v_h100.py
    gpu_count: 1
    output_type: video
    input_image_path: examples/data/1.png
    input_audio_path: examples/data/1.wav
    timeout_seconds: 7200
    height: 720
    width: 416
    ppl_config_overrides:
      attn_impl: TORCH_SDPA
