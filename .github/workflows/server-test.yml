name: Server Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'telefuser/service/**'
      - 'telefuser/client/**'
      - 'telefuser/entrypoints/**'
      - 'tests/server/**'
      - 'tests/integration/**'
      - '.github/workflows/server-test.yml'
      - 'scripts/run_ci_tests.sh'
  pull_request:
    branches: [main, develop]
    paths:
      - 'telefuser/service/**'
      - 'telefuser/client/**'
      - 'telefuser/entrypoints/**'
      - 'tests/server/**'
      - 'tests/integration/**'
      - '.github/workflows/server-test.yml'
      - 'scripts/run_ci_tests.sh'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Local CI equivalent: bash scripts/run_ci_tests.sh
  server-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"

      # Step 1: Lint checks (from scripts/run_ci_tests.sh)
      - name: Run lint checks
        run: |
          echo "=========================================="
          echo "Running lint checks"
          echo "=========================================="
          ruff check telefuser tests --output-format=full --exclude telefuser/_version.py
          ruff format --check telefuser tests --exclude telefuser/_version.py
          ruff check --select I telefuser tests --exclude telefuser/_version.py

      # Step 2: Unit tests (from scripts/run_ci_tests.sh)
      - name: Run unit tests
        run: |
          echo "=========================================="
          echo "Running unit tests"
          echo "=========================================="
          pytest tests/unit -v \
            -m "not gpu and not distributed and not slow and not quant" \
            --tb=short

      # Step 3: Server integration test (legacy client-based, from scripts/run_ci_tests.sh)
      - name: Run server integration test (legacy)
        run: |
          echo "=========================================="
          echo "Running server tests (legacy)"
          echo "=========================================="
          python tests/server/run_integration_test.py --port 18000
        timeout-minutes: 5

      # Step 4: Server pytest tests (includes OpenAI API tests, from scripts/run_ci_tests.sh)
      - name: Run server pytest tests (includes OpenAI API)
        run: |
          echo "=========================================="
          echo "Running server pytest tests (includes OpenAI API)"
          echo "=========================================="
          pytest tests/server/ -v \
            -m "not gpu and not distributed and not slow" \
            --tb=short
        timeout-minutes: 10

      # Step 5: Integration tests (from scripts/run_ci_tests.sh)
      - name: Run integration tests
        run: |
          echo "=========================================="
          echo "Running integration tests"
          echo "=========================================="
          pytest tests/integration -v \
            -m "not gpu and not distributed and not slow and not quant and not filesystem" \
            --tb=short || true

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-ci-logs-py${{ matrix.python-version }}
          path: |
            /tmp/telefuser_test_*/
            /tmp/*.log
          retention-days: 7

  # Extended server tests with coverage
  server-pytest-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: server-ci

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"

      - name: Run server tests with coverage
        run: |
          pytest tests/server/ -v \
            --cov=telefuser.service \
            --cov=telefuser.client \
            --cov-report=xml \
            --cov-report=term-missing \
            -m "not gpu and not distributed" \
            --tb=short

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: server-tests
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # Functional tests with client SDK
  server-functional-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: server-ci

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"

      - name: Start test server
        run: |
          python tests/server/run_test_server.py --port 18001 --host 127.0.0.1 &
          echo $! > server.pid
          # Wait for server to be ready
          for i in {1..30}; do
            if curl -s http://127.0.0.1:18001/v1/service/status > /dev/null; then
              echo "Server is ready!"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start"
          exit 1

      - name: Run functional tests
        run: |
          python tests/server/client/test_client.py http://127.0.0.1:18001

      - name: Stop test server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) 2>/dev/null || true
            rm server.pid
          fi

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-functional-test-logs
          path: |
            /tmp/telefuser_test_*/
            server.pid
          retention-days: 7
