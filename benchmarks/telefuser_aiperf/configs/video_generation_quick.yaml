# yaml-language-server: $schema=../../aiperf/src/aiperf/config/schema/aiperf-config.schema.json

schemaVersion: "2.0"

randomSeed: 42

benchmark:
  model: telefuser-video

  endpoint:
    url: ${TELEFUSER_AIPERF_URL:http://127.0.0.1:8000}
    type: video_generation
    timeout: 1800.0

  tokenizer:
    name: builtin

  dataset:
    type: file
    path: ./benchmarks/telefuser_aiperf/data/video_prompts.jsonl
    format: single_turn
    sampling: sequential

  profiling:
    type: concurrency
    concurrency: 1
    requests: 1

  artifacts:
    dir: ./artifacts/telefuser_aiperf/video_quick
    summary: [json]
    records: [jsonl]
