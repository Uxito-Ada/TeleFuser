[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --strict-config
    --verbose
    --tb=short
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    gpu: marks tests that require GPU (deselect with '-m "not gpu"')
    sm80: marks tests that require SM80+ GPU
    sm90: marks tests that require SM90+ GPU
    sm100: marks tests that require SM100+ GPU (Blackwell)
